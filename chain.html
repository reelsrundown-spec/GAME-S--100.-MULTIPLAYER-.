<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Reaction - Game Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        
        .status-bar { margin: 15px 0; font-size: 1.2rem; font-weight: bold; padding: 10px; border-radius: 10px; transition: 0.3s; }
        .red-turn { background: #ff4d4d; color: white; }
        .green-turn { background: #2ecc71; color: white; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 4px; 
            max-width: 350px; 
            margin: 0 auto; 
            background: #333; 
            padding: 5px; 
            border-radius: 8px;
        }
        .cell { 
            aspect-ratio: 1/1.2; 
            background: #1e1e1e; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative;
            transition: 0.2s;
        }
        .atom {
            width: 15px; height: 15px; border-radius: 50%; position: absolute;
            transition: 0.3s all ease;
        }
        .red-atom { background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .green-atom { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        
        .winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .reset-btn { margin-top: 20px; padding: 12px 30px; background: #00d2ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Back</a>
        <span>Chain Reaction</span>
    </div>

    <div id="turnIndicator" class="status-bar red-turn">Red's Turn</div>

    <div class="grid" id="gameGrid"></div>

    <div id="winnerOverlay" class="winner-overlay">
        <h1 id="winnerText">Winner!</h1>
        <button class="reset-btn" onclick="initGame()">Play Again</button>
    </div>

    <script>
        const ROWS = 8, COLS = 6;
        let board = [];
        let currentPlayer = 'red';
        let isExploding = false;
        let moveCount = 0;

        function initGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            board = [];
            currentPlayer = 'red';
            moveCount = 0;
            isExploding = false;
            document.getElementById('winnerOverlay').style.display = 'none';
            updateTurnUI();

            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = { owner: null, count: 0, capacity: getCapacity(r, c) };
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleMove(r, c);
                    grid.appendChild(cell);
                }
            }
        }

        function getCapacity(r, c) {
            let cap = 4;
            if ((r === 0 || r === ROWS - 1) && (c === 0 || c === COLS - 1)) cap = 2; // Corners
            else if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) cap = 3; // Edges
            return cap;
        }

        async function handleMove(r, c) {
            if (isExploding || (board[r][c].owner && board[r][c].owner !== currentPlayer)) return;

            moveCount++;
            await addAtom(r, c, currentPlayer);
            
            if (!isExploding) {
                checkWinner();
                currentPlayer = currentPlayer === 'red' ? 'green' : 'red';
                updateTurnUI();
            }
        }

        async function addAtom(r, c, player) {
            board[r][c].owner = player;
            board[r][c].count++;
            drawCell(r, c);

            if (board[r][c].count >= board[r][c].capacity) {
                isExploding = true;
                await explode(r, c);
            }
        }

        async function explode(r, c) {
            const player = board[r][c].owner;
            board[r][c].count = 0;
            board[r][c].owner = null;
            drawCell(r, c);

            const neighbors = [
                [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
            ];

            const promises = [];
            for (let [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    promises.push(new Promise(resolve => {
                        setTimeout(async () => {
                            await addAtom(nr, nc, player);
                            resolve();
                        }, 150);
                    }));
                }
            }
            await Promise.all(promises);
            isExploding = false;
            checkWinner();
            if (!isExploding) {
                currentPlayer = currentPlayer === 'red' ? 'green' : 'red';
                updateTurnUI();
            }
        }

        function drawCell(r, c) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.innerHTML = '';
            const data = board[r][c];
            for (let i = 0; i < data.count; i++) {
                const atom = document.createElement('div');
                atom.className = `atom ${data.owner}-atom`;
                // Simple positioning for atoms
                if (i === 0) atom.style.top = '10px';
                if (i === 1) atom.style.bottom = '10px';
                if (i === 2) atom.style.left = '5px';
                cell.appendChild(atom);
            }
        }

        function updateTurnUI() {
            const indicator = document.getElementById('turnIndicator');
            indicator.innerText = `${currentPlayer.toUpperCase()}'s Turn`;
            indicator.className = `status-bar ${currentPlayer}-turn`;
        }

        function checkWinner() {
            if (moveCount < 2) return;
            let red = 0, green = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c].owner === 'red') red++;
                    if (board[r][c].owner === 'green') green++;
                }
            }
            if (red === 0 || green === 0) {
                const winner = red > 0 ? 'RED' : 'GREEN';
                document.getElementById('winnerText').innerText = `${winner} WINS!`;
                document.getElementById('winnerOverlay').style.display = 'flex';
                gameActive = false;
            }
        }

        initGame();
    </script>
</body>
</html>
