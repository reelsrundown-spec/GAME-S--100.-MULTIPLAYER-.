<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Online Multiplayer - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        h2 { color: #ffce00; margin-top: 10px; letter-spacing: 5px; }
        .bingo-letters { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        .letter { opacity: 0.2; transition: 0.3s; color: #ffce00; }
        .letter.active { opacity: 1; text-shadow: 0 0 10px #ffce00; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 12px; }
        .cell { aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
        .cell.marked { background: #ffce00; color: #121212; border-color: #fff; transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 1.1rem; color: #ffce00; height: 25px; font-weight: bold; }
        .room-controls { margin: 15px 0; }
        input { padding: 10px; border-radius: 8px; border: none; width: 140px; outline: none; background: #222; color: white; border: 1px solid #444; }
        .join-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .reset-btn { margin-top: 20px; padding: 12px 30px; background: #ffce00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn"><- Back</a>
        <span>BINGO ONLINE</span>
    </div>
    
    <h2>BINGO</h2>

    <div class="room-controls">
        <input type="text" id="roomInput" placeholder="Room Code">
        <button class="join-btn" onclick="joinRoom()">Join Room</button>
    </div>

    <div class="bingo-letters" id="bingoDisplay">
        <span class="letter">B</span><span class="letter">I</span><span class="letter">N</span><span class="letter">G</span><span class="letter">O</span>
    </div>

    <div id="bingoGrid" class="grid"></div>
    <div id="status">Join a room to play!</div>
    <button class="reset-btn" onclick="initBingo()">Shuffle Board</button>

    <script>
        // Audio Assets
        const clickSound = new Audio('jump.mp3');
        const winSound = new Audio('gameover.mp3');

        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let playerBoard = [];
        let markedIndices = new Set();
        let bingoCount = 0;
        let gameActive = false;
        let currentRoom = "";
        let myId = "p_" + Math.floor(Math.random() * 99999);
        let turnOwner = "";

        function joinRoom() {
            const input = document.getElementById('roomInput').value;
            if (!input) return alert("Enter Room Code!");
            currentRoom = input;

            const roomRef = db.ref('rooms/' + currentRoom);
            
            roomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    turnOwner = data.turn;
                    if (data.lastMove) {
                        syncMove(data.lastMove);
                    }
                    updateUI();
                } else {
                    // First player creates the room and gets the turn
                    roomRef.set({ turn: myId, lastMove: 0 });
                }
            });

            gameActive = true;
            document.getElementById('status').innerText = "Connected!";
        }
