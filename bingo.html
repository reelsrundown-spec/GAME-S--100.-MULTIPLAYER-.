<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Online & AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; cursor: pointer; }
        h2 { color: #ffce00; margin-top: 10px; letter-spacing: 5px; }

        /* Screens */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .active-screen { display: flex; }

        .menu-btn { background: #ffce00; color: #121212; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin: 10px; cursor: pointer; width: 220px; box-shadow: 0 4px #cca300; }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px #cca300; }
        
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; width: 200px; background: #222; color: white; margin-bottom: 15px; text-align: center; outline: none; font-size: 1.1rem; }

        /* Game UI */
        .bingo-letters { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        .letter { opacity: 0.2; transition: 0.3s; color: #ffce00; }
        .letter.active { opacity: 1; text-shadow: 0 0 10px #ffce00; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 12px; }
        .cell { aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: 1px solid #444; transition: 0.2s; }
        .cell.marked { background: #ffce00; color: #121212; border-color: #fff; transform: scale(0.95); }
        
        #status { margin-top: 20px; font-size: 1.1rem; color: #ffce00; font-weight: bold; min-height: 25px; }

        /* Overlay */
        #resultOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #resultText { font-size: 2.8rem; font-weight: bold; margin-bottom: 30px; }
        .win-text { color: #27ae60; text-shadow: 0 0 20px #27ae60; }
        .lose-text { color: #e74c3c; text-shadow: 0 0 20px #e74c3c; }

        /* Custom Alert */
        #customAlert {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #1e1e1e;
            padding: 20px; border-radius: 15px; border: 2px solid #ffce00;
            z-index: 3000; width: 260px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="back-btn"><- Back</a><span>BINGO</span></div>

    <div id="startScreen" class="screen active-screen">
        <h2>BINGO</h2>
        <button class="menu-btn" onclick="switchScreen('roomScreen')">Play with Friends</button>
        <button class="menu-btn" style="background: #2c3e50; color: white;" onclick="startAI()">Play with Computer</button>
    </div>

    <div id="roomScreen" class="screen">
        <h2>Enter Room</h2>
        <input type="text" id="roomInput" placeholder="Room Code (e.g. 123)">
        <button class="menu-btn" onclick="joinRoom()">Join Game</button>
        <button class="back-btn" onclick="switchScreen('startScreen')">Back</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="bingo-letters" id="bingoDisplay">
            <span class="letter">B</span><span class="letter">I</span><span class="letter">N</span><span class="letter">G</span><span class="letter">O</span>
        </div>
        <div id="bingoGrid" class="grid"></div>
        <div id="status">Ready!</div>
        <button class="back-btn" style="margin-top: 25px;" onclick="location.reload()">Quit Game</button>
    </div>

    <div id="resultOverlay">
        <div id="resultText"></div>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <button class="menu-btn" style="width: 140px;" onclick="regame()">Regame</button>
            <button class="menu-btn" style="width: 140px; background: #2c3e50; color: white;" onclick="location.reload()">Home</button>
        </div>
    </div>

    <div id="customAlert">
        <p id="alertMsg" style="margin-bottom: 20px; font-weight: bold;"></p>
        <button class="back-btn" onclick="closeAlert()" style="background: #ffce00; color: black; padding: 10px 30px;">OK</button>
    </div>

    <script>
        const clickSound = new Audio('jump.mp3');
        const winSound = new Audio('dora.mp3');
        const loseSound = new Audio('lose.mp3');

        // Firebase Setup
        const firebaseConfig = { databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let playerBoard = [], markedIndices = new Set(), bingoCount = 0;
        let gameActive = false, currentRoom = "", myId = "p_" + Math.floor(Math.random() * 99999);
        let turnOwner = "", isAI = false;

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function showAlert(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'block';
        }
        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

        // Start AI Mode
        function startAI() {
            isAI = true; gameActive = true;
            switchScreen('gameScreen');
            initBingo();
            document.getElementById('status').innerText = "Your Turn!";
        }

        // Join Multiplayer Room
        function joinRoom() {
            const input = document.getElementById('roomInput').value;
            if (!input) return showAlert("Please enter a room code!");
            currentRoom = input;
            isAI = false;
            
            db.ref('rooms/' + currentRoom).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.winner) { endGame(data.winner); return; }
                    turnOwner = data.turn;
                    if (data.lastMove) syncMove(data.lastMove);
                    updateUI();
                } else { 
                    db.ref('rooms/' + currentRoom).set({ turn: myId, lastMove: 0 }); 
                }
            });

            switchScreen('gameScreen');
            initBingo();
            gameActive = true;
        }

        function updateUI() {
            if(isAI) return;
            const statusBox = document.getElementById('status');
            if (turnOwner === myId) {
                statusBox.innerText = "YOUR TURN!";
                statusBox.style.color = "#ffce00";
            } else {
                statusBox.innerText = "OPPONENT'S TURN...";
                statusBox.style.color = "#888";
            }
        }

        function initBingo() {
            const gridElement = document.getElementById('bingoGrid');
            gridElement.innerHTML = '';
            playerBoard = []; markedIndices.clear(); bingoCount = 0;
            let nums = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            nums.forEach((num) => {
                playerBoard.push(num);
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.innerText = num;
                cell.onclick = () => handleMove(num);
                gridElement.appendChild(cell);
            });
            updateBingoDisplay();
        }

        function handleMove(num) {
            if (!gameActive) return;
            if (!isAI && turnOwner !== myId) return showAlert("Wait for your turn!");
            
            const idx = playerBoard.indexOf(num);
            if (markedIndices.has(idx)) return;

            if (isAI) {
                markCell(idx);
                if (gameActive) {
                    document.getElementById('status').innerText = "Thinking...";
                    setTimeout(cpuMove, 800);
                }
            } else {
                db.ref('rooms/' + currentRoom).update({ lastMove: num, turn: "waiting" });
            }
        }

        function cpuMove() {
            if (!gameActive) return;
            let unmarked = playerBoard.map((_, i) => !markedIndices.has(i) ? i : null).filter(v => v !== null);
            if (unmarked.length > 0) {
                markCell(unmarked[Math.floor(Math.random() * unmarked.length)]);
                if (gameActive) document.getElementById('status').innerText = "Your Turn!";
            }
        }

        function syncMove(num) {
            if (num === 0) return;
            const index = playerBoard.indexOf(num);
            if (index !== -1 && !markedIndices.has(index)) {
                markCell(index);
                if (turnOwner !== myId) db.ref('rooms/' + currentRoom).update({ turn: myId });
            }
        }

        function markCell(index) {
            if (markedIndices.has(index)) return;
            markedIndices.add(index);
            const cells = document.querySelectorAll('.cell');
            if (cells[index]) cells[index].classList.add('marked');
            clickSound.play();
            checkBingo();
        }

        function checkBingo() {
            let lines = 0, size = 5;
            for (let i = 0; i < size; i++) {
                let r = true, c = true;
                for (let j = 0; j < size; j++) {
                    if (!markedIndices.has(i * size + j)) r = false;
                    if (!markedIndices.has(j * size + i)) c = false;
                }
                if (r) lines++; if (c) lines++;
            }
            let d1 = true, d2 = true;
            for (let i = 0; i < size; i++) {
                if (!markedIndices.has(i * size + i)) d1 = false;
                if (!markedIndices.has(i * size + (size - 1 - i))) d2 = false;
            }
            if (d1) lines++; if (d2) lines++;
            bingoCount = lines; updateBingoDisplay();
            
            if (bingoCount >= 5 && gameActive) {
                if (isAI) { endGame(myId); } 
                else { db.ref('rooms/' + currentRoom).update({ winner: myId }); }
            }
        }

        function endGame(winnerId) {
            gameActive = false;
            const overlay = document.getElementById('resultOverlay');
            const text = document.getElementById('resultText');
            overlay.style.display = 'flex';
            if (winnerId === myId) {
                text.innerText = "നീ ജയിച്ചു! 🎉"; text.className = "win-text"; winSound.play();
            } else {
                text.innerText = "നീ തോറ്റു! 👎"; text.className = "lose-text"; loseSound.play();
            }
        }

        function regame() {
            document.getElementById('resultOverlay').style.display = 'none';
            if (!isAI && currentRoom) {
                db.ref('rooms/' + currentRoom).update({ winner: null, lastMove: 0, turn: myId });
            }
            initBingo();
            gameActive = true;
            if(isAI) document.getElementById('status').innerText = "Your Turn!";
        }

        function updateBingoDisplay() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((l, i) => l.className = i < bingoCount ? 'letter active' : 'letter');
        }
    </script>
</body>
</html>
