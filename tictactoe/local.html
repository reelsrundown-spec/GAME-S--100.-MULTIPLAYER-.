<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Local Multiplayer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; padding: 10px; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        #status { font-size: 1.5rem; margin: 30px 0; font-weight: bold; color: #ffce00; height: 40px; }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; margin: 0 auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        
        .cell.winner { background: #ffce00 !important; color: #121212 !important; box-shadow: 0 0 20px #ffce00; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .restart-btn { margin-top: 40px; background: #ffffff; color: #000; border: none; padding: 14px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .restart-btn:active { transform: scale(0.95); }
        
        .info-text { margin-top: 20px; font-size: 14px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../tichome.html" class="back-btn">← MENU</a>
        <span style="color:#00d2ff; font-weight:bold;">LOCAL 2P</span>
    </div>

    <div id="status">PLAYER X'S TURN</div>

    <div class="board">
        <div class="cell" onclick="makeMove(0)" id="c0"></div>
        <div class="cell" onclick="makeMove(1)" id="c1"></div>
        <div class="cell" onclick="makeMove(2)" id="c2"></div>
        <div class="cell" onclick="play(3)" onclick="makeMove(3)" id="c3"></div>
        <div class="cell" onclick="makeMove(4)" id="c4"></div>
        <div class="cell" onclick="makeMove(5)" id="c5"></div>
        <div class="cell" onclick="makeMove(6)" id="c6"></div>
        <div class="cell" onclick="makeMove(7)" id="c7"></div>
        <div class="cell" onclick="makeMove(8)" id="c8"></div>
    </div>

    <button class="restart-btn" onclick="resetBoard()">RESTART MATCH</button>
    
    <div class="info-text">PASS & PLAY MODE</div>

    <script>
        let board = Array(9).fill("");
        let currentPlayer = "X";
        let gameActive = true;

        function makeMove(i) {
            if (board[i] !== "" || !gameActive) return;

            board[i] = currentPlayer;
            updateUI();

            if (checkWin()) {
                document.getElementById('status').innerText = "PLAYER " + currentPlayer + " WINS! 🏆";
                document.getElementById('status').style.color = "#ffce00";
                gameActive = false;
            } else if (!board.includes("")) {
                document.getElementById('status').innerText = "IT'S A DRAW! 🤝";
                document.getElementById('status').style.color = "#ffffff";
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById('status').innerText = "PLAYER " + currentPlayer + "'S TURN";
                document.getElementById('status').style.color = (currentPlayer === "X") ? "#ff6b6b" : "#00d2ff";
            }
        }

        function updateUI() {
            board.forEach((val, i) => {
                const c = document.getElementById('c' + i);
                c.innerText = val;
                c.className = 'cell ' + val.toLowerCase();
            });
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    c.forEach(idx => document.getElementById('c' + idx).classList.add('winner'));
                    return true;
                }
            }
            return false;
        }

        function resetBoard() {
            board = Array(9).fill("");
            currentPlayer = "X";
            gameActive = true;
            document.getElementById('status').innerText = "PLAYER X'S TURN";
            document.getElementById('status').style.color = "#ff6b6b";
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('winner');
                c.innerText = "";
            });
            updateUI();
        }
    </script>
</body>
</html>
