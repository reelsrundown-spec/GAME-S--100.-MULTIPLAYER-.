<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Local</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 350px; margin: 0 auto; padding: 10px; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        #status { font-size: 1.5rem; margin: 30px 0; font-weight: bold; color: #ffce00; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; background: #222; padding: 12px; border-radius: 15px; }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        .cell.x { color: #ff6b6b; } .cell.o { color: #00d2ff; }
        .cell.winner { background: #ffce00 !important; color: #000 !important; }
        .restart-btn { margin-top: 40px; background: white; color: #000; border: none; padding: 12px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="../tichome.html" class="back-btn">← Back</a><span>LOCAL 2P</span></div>
    <div id="status">X's Turn</div>
    <div class="board">
        <div class="cell" onclick="play(0)" id="c0"></div>
        <div class="cell" onclick="play(1)" id="c1"></div>
        <div class="cell" onclick="play(2)" id="c2"></div>
        <div class="cell" onclick="play(3)" id="c3"></div>
        <div class="cell" onclick="play(4)" id="c4"></div>
        <div class="cell" onclick="play(5)" id="c5"></div>
        <div class="cell" onclick="play(6)" id="c6"></div>
        <div class="cell" onclick="play(7)" id="c7"></div>
        <div class="cell" onclick="play(8)" id="c8"></div>
    </div>
    <button class="restart-btn" onclick="reset()">RESTART</button>

    <script>
        let b = Array(9).fill(""); let p = "X"; let active = true;
        function play(i) {
            if (b[i] || !active) return;
            b[i] = p; update();
            if (win()) { document.getElementById('status').innerText = p + " Wins!"; active = false; }
            else if (!b.includes("")) { document.getElementById('status').innerText = "Draw!"; active = false; }
            else { p = p === "X" ? "O" : "X"; document.getElementById('status').innerText = p + "'s Turn"; }
        }
        function update() { b.forEach((v, i) => { const c = document.getElementById('c'+i); c.innerText = v; c.className = 'cell ' + v.toLowerCase(); }); }
        function win() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (b[c[0]] && b[c[0]] === b[c[1]] && b[c[0]] === b[c[2]]) {
                    c.forEach(idx => document.getElementById('c'+idx).classList.add('winner'));
                    return true;
                }
            } return false;
        }
        function reset() { b = Array(9).fill(""); p = "X"; active = true; document.getElementById('status').innerText = "X's Turn"; document.querySelectorAll('.cell').forEach(c => c.classList.remove('winner')); update(); }
    </script>
</body>
</html>
