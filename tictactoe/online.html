<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Online Multiplayer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; padding: 10px; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #status { font-size: 1.4rem; margin: 25px 0; font-weight: bold; color: #00d2ff; min-height: 40px; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; margin: 0 auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .cell.x { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
        .cell.o { color: #00d2ff; text-shadow: 0 0 15px #00d2ff; }
        
        /* Win Animation */
        .cell.winner { background: #00d2ff !important; color: #121212 !important; box-shadow: 0 0 25px #00d2ff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .restart-btn { margin-top: 35px; background: #ffce00; color: #121212; border: none; padding: 14px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,206,0,0.2); }
        .restart-btn:active { transform: scale(0.95); }
        
        #player-type { color: #ffce00; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        #room-display { margin-top: 25px; font-size: 12px; color: #666; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../tichome.html" class="back-btn">← EXIT</a>
        <span id="player-type">INITIALIZING...</span>
    </div>

    <div id="status">CONNECTING TO SERVER...</div>
