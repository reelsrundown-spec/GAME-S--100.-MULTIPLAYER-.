<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Player vs AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; padding: 10px; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        #status { font-size: 1.3rem; margin: 20px 0; font-weight: bold; height: 35px; color: #00d2ff; }
        
        /* Difficulty Selectors */
        .difficulty-container { margin-bottom: 20px; }
        .diff-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; margin: 0 5px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .diff-btn.active { background: #ffce00; color: #000; border-color: #ffce00; }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; margin: 0 auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        .cell.winner { background: #00d2ff !important; color: #121212 !important; box-shadow: 0 0 20px #00d2ff; animation: pulse 0.8s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .controls { margin-top: 30px; }
        .restart-btn { background: #ffffff; color: #121212; border: none; padding: 14px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .restart-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../tichome.html" class="back-btn">← MENU</a>
        <span style="color:#ffce00; font-weight:bold;">VS COMPUTER</span>
    </div>

    <div id="status">YOUR TURN (X)</div>

    <div class="difficulty-container">
        <button class="diff-btn active" onclick="setDifficulty('easy', this)">EASY</button>
        <button class="diff-btn" onclick="setDifficulty('normal', this)">NORMAL</button>
        <button class="diff-btn" onclick="setDifficulty('hard', this)">HARD</button>
    </div>

    <div class="board" id="board">
        <div class="cell" onclick="handlePlayerMove(0)" id="c0"></div>
        <div class="cell" onclick="handlePlayerMove(1)" id="c1"></div>
        <div class="cell" onclick="handlePlayerMove(2)" id="c2"></div>
        <div class="cell" onclick="handlePlayerMove(3)" id="c3"></div>
        <div class="cell" onclick="handlePlayerMove(4)" id="c4"></div>
        <div class="cell" onclick="handlePlayerMove(5)" id="c5"></div>
        <div class="cell" onclick="handlePlayerMove(6)" id="c6"></div>
        <div class="cell" onclick="handlePlayerMove(7)" id="c7"></div>
        <div class="cell" onclick="handlePlayerMove(8)" id="c8"></div>
    </div>

    <div class="controls">
        <button class="restart-btn" onclick="resetGame()">RESTART MATCH</button>
    </div>

    <script>
        let board = Array(9).fill("");
        let gameActive = true;
        let difficulty = 'easy';
        let isAiThinking = false; // Turn Lock

        function setDifficulty(level, btn) {
            difficulty = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            resetGame();
        }

        function handlePlayerMove(i) {
            if (board[i] !== "" || !gameActive || isAiThinking) return;

            board[i] = "X";
            updateUI();
            
            if (!checkWin()) {
                isAiThinking = true;
                document.getElementById('status').innerText = "AI IS THINKING...";
                document.getElementById('status').style.color = "#555";
                setTimeout(aiMove, 800);
            }
        }

        function aiMove() {
            if (!gameActive) return;

            let move;
            if (difficulty === 'easy') {
                move = getRandomMove();
            } else if (difficulty === 'normal') {
                move = Math.random() > 0.5 ? getSmartMove() : getRandomMove();
            } else {
                move = getSmartMove(); // Minimax logic for Hard
            }

            if (move !== null) {
                board[move] = "O";
                updateUI();
                if (!checkWin()) {
                    isAiThinking = false;
                    document.getElementById('status').innerText = "YOUR TURN (X)";
                    document.getElementById('status').style.color = "#00d2ff";
                }
            }
        }

        function getRandomMove() {
            let available = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : null;
        }

        function getSmartMove() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            // 1. Try to win
            for (let c of wins) {
                let count = c.filter(idx => board[idx] === "O").length;
                let empty = c.filter(idx => board[idx] === "");
                if (count === 2 && empty.length === 1) return empty[0];
            }
            
            // 2. Block player
            for (let c of wins) {
                let count = c.filter(idx => board[idx] === "X").length;
                let empty = c.filter(idx => board[idx] === "");
                if (count === 2 && empty.length === 1) return empty[0];
            }
            
            // 3. Take center
            if (board[4] === "") return 4;
            
            return getRandomMove();
        }

        function updateUI() {
            board.forEach((val, i) => {
                const cell = document.getElementById('c' + i);
                cell.innerText = val;
                cell.className = 'cell ' + val.toLowerCase();
            });
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    const winner = board[c[0]];
                    document.getElementById('status').innerText = winner === "X" ? "YOU WON! 🎉" : "AI WON! 🤖";
                    document.getElementById('status').style.color = "#ffce00";
                    c.forEach(idx => document.getElementById('c' + idx).classList.add('winner'));
                    gameActive = false;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "IT'S A DRAW! 🤝";
                document.getElementById('status').style.color = "#ffffff";
                gameActive = false;
                return true;
            }
            return false;
        }

        function resetGame() {
            board = Array(9).fill("");
            gameActive = true;
            isAiThinking = false;
            document.getElementById('status').innerText = "YOUR TURN (X)";
            document.getElementById('status').style.color = "#00d2ff";
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('winner');
                c.innerText = "";
            });
            updateUI();
        }
    </script>
</body>
</html>
