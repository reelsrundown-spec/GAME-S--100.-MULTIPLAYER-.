<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Online</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        .modes { margin: 15px 0; display: flex; justify-content: center; gap: 8px; }
        .mode-btn { padding: 8px 12px; border-radius: 20px; border: 2px solid #00d2ff; background: transparent; color: #00d2ff; cursor: pointer; font-size: 12px; font-weight: bold; }
        .mode-btn.active { background: #00d2ff; color: #121212; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 10px auto; background: #333; padding: 10px; border-radius: 15px; }
        .cell { width: 90px; height: 90px; background: #1e1e1e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; }
        .cell.x { color: #ff6b6b; } .cell.o { color: #00d2ff; }
        #status { font-size: 1.1rem; margin: 15px 0; color: #00d2ff; font-weight: bold; height: 25px; }
        .reset-btn { padding: 10px 25px; background: #ffce00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn">← Back</a>
        <span>Tic Tac Toe</span>
    </div>

    <div class="modes">
        <button class="mode-btn active" id="btn-AI" onclick="setMode('AI')">VS AI</button>
        <button class="mode-btn" id="btn-LOCAL" onclick="setMode('LOCAL')">LOCAL</button>
        <button class="mode-btn" id="btn-ONLINE" onclick="setMode('ONLINE')">ONLINE</button>
    </div>

    <div id="status">Your Turn (X)</div>

    <div class="board" id="board">
        <div class="cell" onclick="handleCellClick(0)" id="c0"></div>
        <div class="cell" onclick="handleCellClick(1)" id="c1"></div>
        <div class="cell" onclick="handleCellClick(2)" id="c2"></div>
        <div class="cell" onclick="handleCellClick(3)" id="c3"></div>
        <div class="cell" onclick="handleCellClick(4)" id="c4"></div>
        <div class="cell" onclick="handleCellClick(5)" id="c5"></div>
        <div class="cell" onclick="handleCellClick(6)" id="c6"></div>
        <div class="cell" onclick="handleCellClick(7)" id="c7"></div>
        <div class="cell" onclick="handleCellClick(8)" id="c8"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">Restart</button>

    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-database-compat.js"></script>

    <script>
        // --- YOUR CONFIG START ---
        const firebaseConfig = {
            apiKey: "AIzaSyAC0Ancjw96eamzv0Ja7vMvpETleysfcqQ",
            authDomain: "multiplayer-bingo-e27fd.firebaseapp.com",
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com",
            projectId: "multiplayer-bingo-e27fd",
            storageBucket: "multiplayer-bingo-e27fd.appspot.com",
            messagingSenderId: "768320492362",
            appId: "1:768320492362:web:ad711f314c523c5a4167b3",
            measurementId: "G-RM7CNL92TH"
        };
        // --- YOUR CONFIG END ---

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const gameRef = database.ref('tictactoe/global_game');

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        let mode = "AI";

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            
            if (mode === 'ONLINE') {
                document.getElementById('status').innerText = "Syncing Online...";
                gameRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        board = data.board;
                        currentPlayer = data.turn;
                        gameActive = data.active;
                        updateUI();
                    }
                });
            } else {
                gameRef.off();
                resetGame();
            }
        }

        function handleCellClick(index) {
            if (board[index] !== "" || !gameActive) return;

            if (mode === 'ONLINE') {
                board[index] = currentPlayer;
                const nextPlayer = currentPlayer === "X" ? "O" : "X";
                const isWin = checkWinnerLocal();
                gameRef.set({
                    board: board,
                    turn: nextPlayer,
                    active: !isWin && board.includes("")
                });
            } else {
                board[index] = currentPlayer;
                updateUI();
                if (checkWinnerLocal()) {
                    gameActive = false;
                    document.getElementById('status').innerText = `Player ${currentPlayer} Wins!`;
                } else if (!board.includes("")) {
                    gameActive = false;
                    document.getElementById('status').innerText = "Draw!";
                } else {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    document.getElementById('status').innerText = `${currentPlayer}'s Turn`;
                    if (mode === "AI" && currentPlayer === "O") setTimeout(aiMove, 500);
                }
            }
        }

        function aiMove() {
            let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) handleCellClick(empty[Math.floor(Math.random() * empty.length)]);
        }

        function updateUI() {
            board.forEach((val, i) => {
                const cell = document.getElementById(`c${i}`);
                cell.innerText = val;
                cell.className = 'cell ' + val.toLowerCase();
            });
            if (gameActive) {
                document.getElementById('status').innerText = `${currentPlayer}'s Turn`;
            } else {
                const win = checkWinnerLocal();
                document.getElementById('status').innerText = win ? "Game Over!" : "Draw!";
            }
        }

        function checkWinnerLocal() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(c => board[c[0]] !== "" && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]);
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            if (mode === 'ONLINE') {
                gameRef.set({ board: board, turn: "X", active: true });
            } else {
                updateUI();
            }
        }
    </script>
</body>
</html>
