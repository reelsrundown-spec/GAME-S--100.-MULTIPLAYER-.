<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Connection Fixed</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; }
        
        #status { font-size: 1.2rem; margin: 20px 0; font-weight: bold; height: 35px; color: #00d2ff; }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; background: #222; padding: 15px; border-radius: 20px; }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        .cell.winner { background: #00d2ff !important; color: #121212 !important; }

        .restart-btn { margin-top: 30px; background: #ffce00; color: #121212; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #room-id-display { margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="tichome.html" class="back-btn">← Quit</a>
        <span id="player-label" style="color:#ffce00">Connecting...</span>
    </div>

    <div id="status">Syncing with Server...</div>

    <div class="board" id="board">
        <div class="cell" onclick="handleMove(0)" id="c0"></div>
        <div class="cell" onclick="handleMove(1)" id="c1"></div>
        <div class="cell" onclick="handleMove(2)" id="c2"></div>
        <div class="cell" onclick="handleMove(3)" id="c3"></div>
        <div class="cell" onclick="handleMove(4)" id="c4"></div>
        <div class="cell" onclick="handleMove(5)" id="c5"></div>
        <div class="cell" onclick="handleMove(6)" id="c6"></div>
        <div class="cell" onclick="handleMove(7)" id="c7"></div>
        <div class="cell" onclick="handleMove(8)" id="c8"></div>
    </div>

    <button class="restart-btn" onclick="resetGame()">RESTART GAME</button>
    <div id="room-id-display"></div>

    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAC0Ancjw96eamzv0Ja7vMvpETleysfcqQ",
            authDomain: "multiplayer-bingo-e27fd.firebaseapp.com",
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com",
            projectId: "multiplayer-bingo-e27fd",
            storageBucket: "multiplayer-bingo-e27fd.appspot.com",
            messagingSenderId: "768320492362",
            appId: "1:768320492362:web:ad711f314c523c5a4167b3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'ai';
        const roomCode = urlParams.get('room') || 'global_room';

        let board = Array(9).fill("");
        let currentPlayer = "X";
        let mySymbol = null; 
        let gameActive = true;
        let gameRef = database.ref('ttt_rooms/' + roomCode);

        // UI Setup
        document.getElementById('room-id-display').innerText = "Room: " + roomCode;

        if (mode === 'local') {
            mySymbol = "BOTH";
            document.getElementById('player-label').innerText = "LOCAL MODE";
            document.getElementById('status').innerText = "X's Turn";
        } else if (mode === 'ai') {
            mySymbol = "X";
            document.getElementById('player-label').innerText = "VS COMPUTER";
            document.getElementById('status').innerText = "Your Turn (X)";
        } else {
            // ONLINE CONNECTION LOGIC
            connectOnline();
        }

        function connectOnline() {
            gameRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data || !data.p1) {
                    mySymbol = "X";
                    gameRef.update({ p1: true, board: board, turn: "X", active: true });
                } else if (!data.p2) {
                    mySymbol = "O";
                    gameRef.update({ p2: true });
                } else {
                    mySymbol = "VIEWER";
                }
                document.getElementById('player-label').innerText = "YOU ARE: " + mySymbol;
            });

            gameRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    board = data.board || Array(9).fill("");
                    currentPlayer = data.turn || "X";
                    gameActive = (data.active !== undefined) ? data.active : true;
                    updateUI();
                    
                    if (gameActive) {
                        document.getElementById('status').innerText = (currentPlayer === mySymbol) ? "YOUR TURN!" : "WAITING...";
                        document.getElementById('status').style.color = (currentPlayer === mySymbol) ? "#00d2ff" : "#555";
                    } else {
                        checkWin();
                    }
                }
            });
        }

        function handleMove(i) {
            if (board[i] !== "" || !gameActive) return;

            // Turn Enforcement
            if (mySymbol !== "BOTH" && currentPlayer !== mySymbol) return;

            board[i] = currentPlayer;
            
            if (mode === 'local') {
                updateUI();
                if (!checkWin()) {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    document.getElementById('status').innerText = currentPlayer + "'s Turn";
                }
            } else if (mode === 'ai') {
                updateUI();
                if (!checkWin()) {
                    currentPlayer = "O";
                    document.getElementById('status').innerText = "AI thinking...";
                    setTimeout(aiMove, 600);
                }
            } else {
                // Online Sync
                gameRef.update({ board: board, turn: currentPlayer === "X" ? "O" : "X" });
            }
        }

        function aiMove() {
            let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                board[empty[Math.floor(Math.random() * empty.length)]] = "O";
                currentPlayer = "X";
                updateUI();
                checkWin();
            }
        }

        function updateUI() {
            board.forEach((val, i) => {
                const c = document.getElementById('c' + i);
                c.innerText = val;
                c.className = 'cell ' + val.toLowerCase();
            });
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    document.getElementById('status').innerText = board[c[0]] + " WINS! 🎉";
                    c.forEach(idx => document.getElementById('c' + idx).classList.add('winner'));
                    gameActive = false;
                    if (mode === 'online' || mode === 'friend') gameRef.update({ active: false });
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "DRAW! 🤝";
                gameActive = false;
                return true;
            }
            return false;
        }

        function resetGame() {
            board = Array(9).fill("");
            currentPlayer = "X";
            gameActive = true;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('winner'));
            
            if (mode === 'online' || mode === 'friend') {
                gameRef.update({ board: board, turn: "X", active: true });
            } else {
                updateUI();
                document.getElementById('status').innerText = (mode === 'ai') ? "Your Turn (X)" : "X's Turn";
            }
        }
    </script>
</body>
</html>
