<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Ultimate</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        
        .modes { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .mode-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid #00d2ff; background: transparent; color: #00d2ff; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: #00d2ff; color: #121212; }

        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; max-width: 300px; margin: 20px auto; 
            background: #333; padding: 10px; border-radius: 15px;
        }
        .cell { 
            width: 90px; height: 90px; background: #1e1e1e; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 2.5rem; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .cell:active { background: #444; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        
        #status { font-size: 1.2rem; margin: 20px 0; font-weight: bold; height: 30px; color: #00d2ff; }
        .reset-btn { padding: 10px 25px; background: #ffce00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn">← Back</a>
        <span>Tic Tac Toe</span>
    </div>

    <div class="modes">
        <button class="mode-btn active" onclick="setMode('AI')">VS AI</button>
        <button class="mode-btn" onclick="setMode('LOCAL')">LOCAL 2P</button>
        <button class="mode-btn" onclick="setMode('ONLINE')">ONLINE</button>
    </div>

    <div id="status">Your Turn (X)</div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)" id="c0"></div>
        <div class="cell" onclick="makeMove(1)" id="c1"></div>
        <div class="cell" onclick="makeMove(2)" id="c2"></div>
        <div class="cell" onclick="makeMove(3)" id="c3"></div>
        <div class="cell" onclick="makeMove(4)" id="c4"></div>
        <div class="cell" onclick="makeMove(5)" id="c5"></div>
        <div class="cell" onclick="makeMove(6)" id="c6"></div>
        <div class="cell" onclick="makeMove(7)" id="c7"></div>
        <div class="cell" onclick="makeMove(8)" id="c8"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">Restart</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        let mode = "AI"; // Default

        function setMode(newMode) {
            if (newMode === 'ONLINE') {
                alert("Online Multiplayer needs a server. Setting up local for now!");
                return;
            }
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(newMode)) btn.classList.add('active');
            });
            resetGame();
        }

        function makeMove(index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            document.getElementById(`c${index}`).innerText = currentPlayer;
            document.getElementById(`c${index}`).classList.add(currentPlayer.toLowerCase());

            if (checkWinner()) {
                document.getElementById('status').innerText = `Player ${currentPlayer} Wins!`;
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                document.getElementById('status').innerText = "Draw!";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById('status').innerText = `${currentPlayer}'s Turn`;

            if (mode === "AI" && currentPlayer === "O" && gameActive) {
                setTimeout(aiMove, 500);
            }
        }

        function aiMove() {
            let available = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (available.length > 0) {
                let move = available[Math.floor(Math.random() * available.length)];
                makeMove(move);
            }
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(comb => {
                return board[comb[0]] !== "" && board[comb[0]] === board[comb[1]] && board[comb[0]] === board[comb[2]];
            });
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            document.getElementById('status').innerText = "Your Turn (X)";
            for (let i = 0; i < 9; i++) {
                let c = document.getElementById(`c${i}`);
                c.innerText = "";
                c.classList.remove('x', 'o');
            }
        }
    </script>
</body>
</html>
