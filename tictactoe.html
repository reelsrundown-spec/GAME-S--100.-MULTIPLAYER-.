<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        
        .menu-container { display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 20px auto; }
        .opt-btn { padding: 15px; border-radius: 12px; border: none; background: #1e1e1e; color: white; font-weight: bold; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .opt-btn:active { background: #00d2ff; color: #121212; }
        
        .game-area { display: none; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 15px auto; background: #333; padding: 10px; border-radius: 15px; }
        .cell { width: 90px; height: 90px; background: #1e1e1e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; }
        .cell.x { color: #ff6b6b; } .cell.o { color: #00d2ff; }
        
        #status { font-size: 1.1rem; margin-bottom: 10px; color: #00d2ff; font-weight: bold; }
        .room-input { padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px; width: 80%; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn">← Back</a>
        <span id="header-title">Tic Tac Toe</span>
    </div>

    <div id="main-menu" class="menu-container">
        <button class="opt-btn" onclick="startAI()">🤖 Play with Computer (AI)</button>
        <button class="opt-btn" onclick="showRoomUI()">👥 Play with Friends (Private)</button>
        <button class="opt-btn" onclick="startPublic()">🌐 Play Online (Public)</button>
    </div>

    <div id="room-ui" style="display:none; margin-top: 20px;">
        <input type="text" id="roomCode" class="room-input" placeholder="Enter Room Code">
        <br>
        <button class="opt-btn" onclick="joinRoom()">Join / Create Room</button>
    </div>

    <div id="game-area" class="game-area">
        <div id="status">Waiting...</div>
        <div class="board">
            <div class="cell" onclick="cellClick(0)" id="c0"></div>
            <div class="cell" onclick="cellClick(1)" id="c1"></div>
            <div class="cell" onclick="cellClick(2)" id="c2"></div>
            <div class="cell" onclick="cellClick(3)" id="c3"></div>
            <div class="cell" onclick="cellClick(4)" id="c4"></div>
            <div class="cell" onclick="cellClick(5)" id="c5"></div>
            <div class="cell" onclick="cellClick(6)" id="c6"></div>
            <div class="cell" onclick="cellClick(7)" id="c7"></div>
            <div class="cell" onclick="cellClick(8)" id="c8"></div>
        </div>
        <button class="opt-btn" onclick="location.reload()">Quit Game</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAC0Ancjw96eamzv0Ja7vMvpETleysfcqQ",
            authDomain: "multiplayer-bingo-e27fd.firebaseapp.com",
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com",
            projectId: "multiplayer-bingo-e27fd",
            storageBucket: "multiplayer-bingo-e27fd.appspot.com",
            messagingSenderId: "768320492362",
            appId: "1:768320492362:web:ad711f314c523c5a4167b3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let gameRef, playerSymbol = "X", gameMode = "", board = Array(9).fill("");

        function startAI() {
            gameMode = "AI";
            showGame();
            document.getElementById('status').innerText = "Your Turn (X)";
        }

        function showRoomUI() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('room-ui').style.display = 'block';
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (!code) return alert("Enter a code!");
            gameMode = "ONLINE";
            gameRef = database.ref('rooms/' + code);
            initOnline();
        }

        function startPublic() {
            gameMode = "ONLINE";
            gameRef = database.ref('rooms/public_match');
            initOnline();
        }

        function showGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('room-ui').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
        }

        function initOnline() {
            showGame();
            gameRef.on('value', (snap) => {
                const data = snap.val() || { board: Array(9).fill(""), turn: "X" };
                board = data.board;
                renderBoard();
                document.getElementById('status').innerText = data.turn + "'s Turn";
                if (checkWin(board)) document.getElementById('status').innerText = "Game Over!";
            });
        }

        function cellClick(i) {
            if (board[i] !== "" || (gameMode === "AI" && playerSymbol === "O")) return;
            board[i] = playerSymbol;
            if (gameMode === "ONLINE") {
                gameRef.update({ board: board, turn: playerSymbol === "X" ? "O" : "X" });
            } else {
                renderBoard();
                if (!checkWin(board)) {
                    playerSymbol = "O";
                    setTimeout(aiMove, 500);
                }
            }
        }

        function aiMove() {
            let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                board[empty[Math.floor(Math.random() * empty.length)]] = "O";
                playerSymbol = "X";
                renderBoard();
            }
        }

        function renderBoard() {
            board.forEach((val, i) => {
                const c = document.getElementById('c' + i);
                c.innerText = val;
                c.className = 'cell ' + val.toLowerCase();
            });
        }

        function checkWin(b) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(c => b[c[0]] && b[c[0]] === b[c[1]] && b[c[0]] === b[c[2]]);
        }
    </script>
</body>
</html>
