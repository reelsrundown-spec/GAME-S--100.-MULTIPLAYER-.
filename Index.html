<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #00d2ff; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 400px;
            margin: 20px auto;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            border: 2px solid #333;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); background: #333; }
        .icon { font-size: 40px; }
        .locked { opacity: 0.4; }
    </style>
</head>
<body>

    <h1>MY GAME HUB</h1>
    <p>ഗെയിം തിരഞ്ഞെടുക്കൂ</p>

    <div class="grid">
        <a href="dino.html" class="card">
            <div class="icon">🦖</div>
            <div>Dino Jump</div>
        </a>

        <div class="card locked">
            <div class="icon">🐍</div>
            <div>Snake (Soon)</div>
        </div>
        
        <div class="card locked">
            <div class="icon">🧱</div>
            <div>Tetris (Soon)</div>
        </div>
    </div>

</body>
</html>
