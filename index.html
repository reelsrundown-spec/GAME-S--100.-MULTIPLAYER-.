<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Welcome</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .welcome-box {
            padding: 40px 60px;
            background: #1e1e1e;
            border: 3px solid #00d2ff;
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
            text-align: center;
        }
        .welcome-box:active {
            transform: scale(0.9);
        }
        .welcome-box h2 {
            margin: 0;
            color: #00d2ff;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { color: #555; margin-top: 15px; position: absolute; bottom: 50px; }
    </style>
</head>
<body>

    <a href="home.html" class="welcome-box">
        <h2>ALL GAMES</h2>
    </a>

    <p>Tap the box to start</p>

</body>
</html>
